<svg width="1507px" height="308px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan>Create a new cargo package at &lt;path&gt;</tspan>
</tspan>
    <tspan x="10px" y="46px">
</tspan>
    <tspan x="10px" y="64px"><tspan>Usage: cargo new [OPTIONS] &lt;PATH&gt;</tspan>
</tspan>
    <tspan x="10px" y="82px">
</tspan>
    <tspan x="10px" y="100px"><tspan>Arguments:</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>  &lt;PATH&gt;  </tspan>
</tspan>
    <tspan x="10px" y="136px">
</tspan>
    <tspan x="10px" y="154px"><tspan>Options:</tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan>      --vcs &lt;VCS&gt;            Initialize a new repository for the given version control system, overriding a global configuration. [possible values: git, hg, pijul, fossil, none]</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan>      --bin                  Use a binary (application) template [default]</tspan>
</tspan>
    <tspan x="10px" y="208px"><tspan>      --lib                  Use a library template</tspan>
</tspan>
    <tspan x="10px" y="226px"><tspan>      --edition &lt;YEAR&gt;       Edition to set for the crate generated</tspan>
</tspan>
    <tspan x="10px" y="244px"><tspan>      --name &lt;NAME&gt;          Set the resulting package name, defaults to the directory name</tspan>
</tspan>
    <tspan x="10px" y="262px"><tspan>      --registry &lt;REGISTRY&gt;  Registry to use</tspan>
</tspan>
    <tspan x="10px" y="280px"><tspan>  -h, --help                 Print help</tspan>
</tspan>
    <tspan x="10px" y="298px">
</tspan>
  </text>

</svg>
