<svg width="1507px" height="308px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .fg-bright-cyan { fill: #55FFFF }
    .fg-bright-green { fill: #55FF55 }
    .fg-cyan { fill: #00AAAA }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan>Create a new cargo package at &lt;path&gt;</tspan>
</tspan>
    <tspan x="10px" y="46px">
</tspan>
    <tspan x="10px" y="64px"><tspan class="fg-bright-green bold">Usage:</tspan><tspan> </tspan><tspan class="fg-bright-cyan bold">cargo new</tspan><tspan> </tspan><tspan class="fg-cyan">[OPTIONS]</tspan><tspan> </tspan><tspan class="fg-cyan">&lt;PATH&gt;</tspan>
</tspan>
    <tspan x="10px" y="82px">
</tspan>
    <tspan x="10px" y="100px"><tspan class="fg-bright-green bold">Arguments:</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>  </tspan><tspan class="fg-cyan">&lt;PATH&gt;</tspan><tspan>  </tspan>
</tspan>
    <tspan x="10px" y="136px">
</tspan>
    <tspan x="10px" y="154px"><tspan class="fg-bright-green bold">Options:</tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan>      </tspan><tspan class="fg-bright-cyan bold">--vcs</tspan><tspan class="fg-cyan"> </tspan><tspan class="fg-cyan">&lt;VCS&gt;</tspan><tspan>            Initialize a new repository for the given version control system, overriding a global configuration. [possible values: git, hg, pijul, fossil, none]</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan>      </tspan><tspan class="fg-bright-cyan bold">--bin</tspan><tspan>                  Use a binary (application) template [default]</tspan>
</tspan>
    <tspan x="10px" y="208px"><tspan>      </tspan><tspan class="fg-bright-cyan bold">--lib</tspan><tspan>                  Use a library template</tspan>
</tspan>
    <tspan x="10px" y="226px"><tspan>      </tspan><tspan class="fg-bright-cyan bold">--edition</tspan><tspan class="fg-cyan"> </tspan><tspan class="fg-cyan">&lt;YEAR&gt;</tspan><tspan>       Edition to set for the crate generated</tspan>
</tspan>
    <tspan x="10px" y="244px"><tspan>      </tspan><tspan class="fg-bright-cyan bold">--name</tspan><tspan class="fg-cyan"> </tspan><tspan class="fg-cyan">&lt;NAME&gt;</tspan><tspan>          Set the resulting package name, defaults to the directory name</tspan>
</tspan>
    <tspan x="10px" y="262px"><tspan>      </tspan><tspan class="fg-bright-cyan bold">--registry</tspan><tspan class="fg-cyan"> </tspan><tspan class="fg-cyan">&lt;REGISTRY&gt;</tspan><tspan>  Registry to use</tspan>
</tspan>
    <tspan x="10px" y="280px"><tspan>  </tspan><tspan class="fg-bright-cyan bold">-h</tspan><tspan>, </tspan><tspan class="fg-bright-cyan bold">--help</tspan><tspan>                 Print help</tspan>
</tspan>
    <tspan x="10px" y="298px">
</tspan>
  </text>

</svg>
